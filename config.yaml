port: 7890
socks-port: 7891
allow-lan: true
mode: Rule
log-level: info
external-controller: 127.0.0.1:9090
proxies:
  - name: ⚡️上游
    type: socks5
    server: 192.168.14.8
    port: 7892
proxy-groups:
  - name: ♻️ 代理
    type: select
    proxies:
      - ⚡️上游
  - name: 🅱️ Binance
    type: select
    proxies:
      - ♻️ 代理
      - 🎯 全球直连
  - name: 📲 电报消息
    type: select
    proxies:
      - ♻️ 代理
      - 🎯 全球直连
  - name: 📹 油管视频
    type: select
    proxies:
      - ♻️ 代理
      - 🎯 全球直连
  - name: 🅿️ PT
    type: select
    proxies:
      - 🎯 全球直连
      - ♻️ 代理
  - name: 🌍 国外媒体
    type: select
    proxies:
      - 🎯 全球直连
      - ♻️ 代理
  - name: 🌏 国内媒体
    type: select
    proxies:
      - 🎯 全球直连
      - ♻️ 代理
  - name: 📢 谷歌FCM
    type: select
    proxies:
      - 🎯 全球直连
      - ♻️ 代理
  - name: 💬󠁣󠁬󠁡󠁩󠁿 OpenAI
    type: select
    proxies:
      - 🎯 全球直连
      - ♻️ 代理
  - name: Ⓜ️ 微软云盘
    type: select
    proxies:
      - 🎯 全球直连
      - ♻️ 代理
  - name: Ⓜ️ 微软服务
    type: select
    proxies:
      - 🎯 全球直连
      - ♻️ 代理
  - name: 🍎 苹果服务
    type: select
    proxies:
      - 🎯 全球直连
      - ♻️ 代理
  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🎯 全球直连
      - ♻️ 代理
  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
  - name: 🛑 全球拦截
    type: select
    proxies:
      - REJECT
      - DIRECT

